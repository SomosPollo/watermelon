[vm]
image = "ubuntu-22.04"

[network]
allow = [
    "crates.io",
    "index.crates.io",
    "static.crates.io",
    "registry-1.docker.io",
    "auth.docker.io",
    "production.cloudflare.docker.com",
    "docker-images-prod.6aa30f8b08e16409b46e0173d6de2f56.r2.cloudflarestorage.com",
]

[tools]
"rust:1.75" = ["cargo", "rustc", "rustfmt", "clippy-driver"]

[security]
enforcement = "log"
