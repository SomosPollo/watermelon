[vm]
image = "ubuntu-22.04"

[network]
allow = [
    "pypi.org",
    "files.pythonhosted.org",
    "registry-1.docker.io",
    "auth.docker.io",
    "production.cloudflare.docker.com",
    "docker-images-prod.6aa30f8b08e16409b46e0173d6de2f56.r2.cloudflarestorage.com",
]

[tools]
"python:3.12-slim" = ["python", "python3", "pip"]

[ports]
forward = [8000]

[security]
enforcement = "log"
