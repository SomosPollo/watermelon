name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build darwin/arm64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -ldflags "-X main.Version=${GITHUB_REF_NAME}" -o watermelon-darwin-arm64 ./cmd/watermelon

      - name: Build darwin/amd64
        env:
          GOOS: darwin
          GOARCH: amd64
        run: go build -ldflags "-X main.Version=${GITHUB_REF_NAME}" -o watermelon-darwin-amd64 ./cmd/watermelon

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            watermelon-darwin-arm64
            watermelon-darwin-amd64
